<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Wylosuj swoją Anielską Kartę na dziś. Delikatne anielskie wsparcie i przesłanie światła dla Twojej duszy.">
    <meta name="keywords" content="karty anielskie, karta dnia, anioły, wróżby, wsparcie duchowe">
    <meta name="theme-color" content="#0a0a1a">

    <meta property="og:type" content="website">
    <meta property="og:title" content="Anielska Karta Dnia | Mistyczna Gwiazda">
    <meta property="og:description" content="Zatrzymaj się i daj się prowadzić. Wylosuj kartę anielską z łagodnym przesłaniem.">
    <meta property="og:image" content="../img/og-angel-card.webp">
    <meta property="og:locale" content="pl_PL">
    
    <title>Anielska Karta Dnia | Mistyczna Gwiazda</title>

    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👼</text></svg>">
    <link rel="manifest" href="../manifest.json">
    <link rel="stylesheet" href="../css/style.v2.min.css?v=9">
    <link rel="stylesheet" href="../css/pages/pl-andelske-karty.css">
    
    <link rel="canonical" href="https://www.mystickahvezda.cz/pl/andelske-karty.html">
    <link rel="alternate" hreflang="cs" href="https://www.mystickahvezda.cz/andelske-karty.html">
    <link rel="alternate" hreflang="sk" href="https://www.mystickahvezda.cz/sk/andelske-karty.html">
    <link rel="alternate" hreflang="pl" href="https://www.mystickahvezda.cz/pl/andelske-karty.html">
    <script src="/js/dist/analytics-init.js" defer></script>
</head>

<body>
    <div class="stars" aria-hidden="true"></div>
    <div id="header-placeholder"></div>

    <main id="main-content">
        <section class="section section--hero angel-hero mh-inline-1a4b335401">
            <div class="container text-center">
                <h1 class="hero__title mb-xl">
                    <span class="text-gradient">Anielska Karta Dnia</span>
                </h1>
                <p class="hero__subtitle">Przesłania miłości i nadziei przewodników niebieskich.</p>

                <div class="angel-card-container mb-xl" id="angel-card-draw">
                    <div class="angel-card-inner">
                        <div class="angel-card-front">
                            <img src="../img/angel-card-back.webp" alt="Rewers karty">
                        </div>
                        <div class="angel-card-back" id="angel-result-card">
                            <!-- Dynamic Content -->
                        </div>
                    </div>
                </div>

                <div id="angel-interpretation" class="card mt-xl mh-inline-f84c7568ce">
                    <h3 id="card-name" class="mh-inline-76c98785d7">---</h3>
                    <p id="card-message" class="mh-inline-f942cac2fb"></p>
                </div>

                <div class="mt-xl">
                    <button class="btn btn--primary btn--lg" id="draw-btn">Wylosuj Kartę</button>
                    <button class="btn btn--secondary btn--lg mh-inline-4e8480f4ea" id="next-btn">Pokaż kolejną kartę</button>
                </div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>
    <script src="../js/dist/api-config.js" defer></script>
    <script src="../js/dist/templates.js" defer></script>
    <script src="../js/dist/components.js" defer></script>
    <script src="../js/dist/angel-cards.js" defer></script>
    <script type="module" src="../js/dist/main.js"></script>
</body>
</html>
