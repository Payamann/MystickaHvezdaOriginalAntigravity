name: CI

on:
  push:
    branches: [ main, claude/* ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint Code

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint -- --max-warnings 5

  test:
    runs-on: ubuntu-latest
    name: Run Tests
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Show jest config being used
        run: cat jest.config.js

      - name: Run tests
        run: NODE_ENV=test node --experimental-vm-modules node_modules/.bin/jest --config jest.config.js --coverage --passWithNoTests --verbose 2>&1 || true

      - name: Run tests (exit code)
        run: NODE_ENV=test node --experimental-vm-modules node_modules/.bin/jest --config jest.config.js --passWithNoTests

  build:
    runs-on: ubuntu-latest
    name: Build Assets

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build CSS
        run: npm run build:css

      - name: Build JavaScript
        run: npm run build:js
        continue-on-error: true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            css/style.v2.min.css
            js/dist/
          retention-days: 7

  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Railway
    needs: [lint, build]
    if: (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/claude/')) && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Railway
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy
        run: railway up --service MystickaHvezdaOriginalAntigravity
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
